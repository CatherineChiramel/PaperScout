# PaperScout Configuration

# Research topics to search for
topics:
  - "agentic AI"
  - "large language models"

# Search settings
search:
  max_results_per_query: 5  # keep low for Gemini free tier (15 req/min limit)
  sources:
    - arxiv
    - semantic_scholar

# Relevance scoring
relevance:
  min_score: 7  # papers scoring below this are skipped

# Email settings
email:
  recipient: ""  # set your email here
  subject_prefix: "[PaperScout]"

# Gemini model
model: "gemini-2.5-flash"
