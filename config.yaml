# PaperScout Configuration

# Research topics to search for
topics:
  # - "agentic AI"
  # - "large language models"
  # - "reinforcement learning"
  # - "prompt engineering"
  - "machine learning"
  - "deep learning"
  - "RAG"

# Search settings
search:
  max_results_per_query: 5  # keep low for Gemini free tier (15 req/min limit)
  since: "2024-06"          # only fetch papers from this month onward (format: YYYY-MM or YYYY-MM-DD)
  sources:
    - arxiv
    - semantic_scholar

# Relevance scoring
relevance:
  min_score: 7  # papers scoring below this are skipped

# Email settings
email:
  recipient: ""  # set your email here
  subject_prefix: "[PaperScout]"

# LLM settings — switch provider by changing these two lines
# Supported providers: google, groq, xai
llm:
  provider: "google"
  model: "gemini-2.5-flash"
  # provider: "groq"
  # model: "llama-3.3-70b-versatile"
  # provider: "xai"
  # model: "grok-3-mini"
